name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # Tests boot the Spring context, which needs the RSA keys — but privateKey.pem is
      # gitignored, so generate a throwaway keypair on the runner before building.
      - name: Generate RSA keys for tests
        run: bash scripts/generate-keys.sh

      - run: ./gradlew build

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: build/reports/tests/






































