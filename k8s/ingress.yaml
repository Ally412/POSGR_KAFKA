# k8s/ingress.yaml
# The front door: routes an external hostname to the shelter Service (L7 / HTTP).
# Needs an ingress controller — on minikube: `minikube addons enable ingress`.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shelter
spec:
  ingressClassName: nginx            # which controller handles this (the nginx addon)
  rules:
    - host: shelter.local            # the hostname clients use
      http:
        paths:
          - path: /                  # everything under /
            pathType: Prefix
            backend:
              service:
                name: shelter        # → the shelter Service
                port:
                  number: 8080       # → its port
