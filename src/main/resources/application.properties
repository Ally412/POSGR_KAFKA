spring.application.name=shelter
# --- Datasource (env-overridable for k8s; localhost defaults for local dev) ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:shelter}
spring.datasource.username=${DB_USER:shelter}
spring.datasource.password=${DB_PASSWORD:shelter}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
